name: CI - Java Services

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'company-observability-starter/**'
      - 'employee-service/**'
      - 'client-service/**'
      - 'account-service/**'
      - 'security-lib/**'
      - 'notification-service/**'
      - 'verification-service/**'
      - 'exchange-service/**'
      - 'stock-service/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'company-observability-starter/**'
      - 'employee-service/**'
      - 'client-service/**'
      - 'account-service/**'
      - 'notification-service/**'
      - 'security-lib/**'
      - 'verification-service/**'
      - 'exchange-service/**'
      - 'stock-service/**'

jobs:

  # ── Detect which services changed ────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Filter changed paths
        uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            company-observability-starter:
              - 'company-observability-starter/**'
            employee-service:
              - 'employee-service/**'
            client-service:
              - 'client-service/**'
            account-service:
              - 'account-service/**'
            notification-service:
              - 'notification-service/**'
            security-lib:
              - 'security-lib/**'
            verification-service:
              - 'verification-service/**'
            exchange-service:
              - 'exchange-service/**'
            stock-service:
              - 'stock-service/**'

  # ── Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest

    # ── PostgreSQL service
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      # ── Wait for PostgreSQL
      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Publish shared libraries to mavenLocal
        run: |
          gradle :security-lib:publishToMavenLocal :company-observability-starter:publishToMavenLocal --no-daemon --warning-mode none --console plain

      - name: Lint
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:checkstyleMain" ":${SERVICE}:checkstyleTest" --no-daemon --warning-mode none --console plain

      - name: Build
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:build" -x test --no-daemon --warning-mode none --console plain

      - name: Test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:test" --no-daemon --warning-mode none --console plain

      - name: Generate JaCoCo report (if available)
        if: always()
        run: |
          SERVICE="${{ matrix.service }}"
          if gradle ":${SERVICE}:tasks" --all --console plain | grep -q "jacocoTestReport"; then
            gradle ":${SERVICE}:jacocoTestReport" --no-daemon --warning-mode none --console plain
          else
            echo "No jacocoTestReport task for ${SERVICE}; skipping coverage report generation."
          fi

      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/TEST-*.xml'
          check_name: 'Test Report - ${{ matrix.service }}'

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: test-results-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 7

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/build/reports/jacoco/test/html/
          if-no-files-found: ignore
          retention-days: 7

  # ── Validate Documentation ────────────────────────────────────────────────
  validate-docs:
    name: Validate Docs (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check for .skip-docs
        id: skip-docs
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "$SERVICE/.skip-docs" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  $SERVICE: documentation validation skipped (.skip-docs)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check README.md exists
        if: steps.skip-docs.outputs.skip != 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          if [ ! -f "$SERVICE/README.md" ]; then
            echo "❌ $SERVICE/README.md is missing."
            exit 1
          fi

      - name: Check README.md required sections
        if: steps.skip-docs.outputs.skip != 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          README="$SERVICE/README.md"
          FAILED=0

          grep -qi "^# " "$README" || FAILED=1
          grep -q '```' "$README" || FAILED=1
          grep -qi "docker.compose\|docker compose" "$README" || FAILED=1
          grep -qi "\.env\|environment variable" "$README" || FAILED=1
          grep -qi "endpoint\|event\|api" "$README" || FAILED=1

          exit $FAILED

      - name: Set up Node.js for redocly
        if: steps.skip-docs.outputs.skip != 'true'
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install redocly
        if: steps.skip-docs.outputs.skip != 'true'
        run: npm ci

      - name: Check OpenAPI spec exists or is skipped
        if: steps.skip-docs.outputs.skip != 'true'
        id: openapi-check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "$SERVICE/.skip-openapi" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          SPEC=""
          for PATH_CANDIDATE in \
            "$SERVICE/docs/openapi.yml" \
            "$SERVICE/docs/openapi.yaml" \
            "$SERVICE/src/main/resources/openapi.yml" \
            "$SERVICE/src/main/resources/openapi.yaml"; do
            if [ -f "$PATH_CANDIDATE" ] && [ -s "$PATH_CANDIDATE" ]; then
              SPEC="$PATH_CANDIDATE"
              break
            fi
          done

          if [ -z "$SPEC" ]; then
            echo "❌ $SERVICE: no OpenAPI spec found."
            exit 1
          fi

          echo "spec=$SPEC" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Validate OpenAPI spec
        if: steps.skip-docs.outputs.skip != 'true' && steps.openapi-check.outputs.skip != 'true'
        run: |
          SPEC="${{ steps.openapi-check.outputs.spec }}"
          npx redocly lint "$SPEC"

  # ── Docker Build Validation ───────────────────────────────────────────────
  docker-validate:
    name: Docker Build & Run Validation (${{ matrix.service }})
    needs: [ detect-changes, build-and-test, validate-docs ]
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check for Dockerfile
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "$SERVICE/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT

      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          docker build -f "$SERVICE/Dockerfile" . -t "ci-test/$SERVICE:latest"

      - name: Test Docker image runs
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          docker run -d --name "ci-$SERVICE" "ci-test/$SERVICE:latest"
          sleep 15
          STATUS=$(docker inspect -f '{{.State.Status}}' "ci-$SERVICE")
          if [ "$STATUS" != "running" ]; then
            docker logs "ci-$SERVICE"
            exit 1
          fi

      - name: Cleanup container
        if: always() && steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          docker rm -f "ci-$SERVICE" >/dev/null 2>&1 || true

  # ── Push to GitHub Container Registry ────────────────────────────────────
  push-to-registry:
    name: Push to GHCR (${{ matrix.service }})
    needs: [ detect-changes, docker-validate ]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check for Dockerfile
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "$SERVICE/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
