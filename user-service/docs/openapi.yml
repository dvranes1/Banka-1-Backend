openapi: 3.1.0
info:
  title: User Service API
  description: API for user and authentication management
  version: "1.0"
servers:
- url: http://localhost:8081
security:
- bearerAuth: []
paths:
  /auth/login:
    post:
      tags:
      - auth-controller
      summary: Login user
      description: Authenticates a user and returns access and refresh tokens. No prior token required.
      operationId: login
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponseDto"
  /auth/refresh:
    post:
      tags:
      - auth-controller
      summary: Refresh access token
      description: Rotates the refresh token and returns a new token pair. No prior access token required.
      operationId: refresh
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponseDto"
  /auth/checkActivate:
    get:
      tags:
      - auth-controller
      summary: Validate activation token
      description: Validates the activation token from the activation link and returns the confirmation ID. No prior token required.
      operationId: checkActivate
      security: []
      parameters:
      - name: confirmationToken
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int64
  /auth/activate:
    post:
      tags:
      - auth-controller
      summary: Activate account
      description: Activates the user account and sets the initial password. No prior token required.
      operationId: activate
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /auth/forgot-password:
    post:
      tags:
      - auth-controller
      summary: Send forgot password email
      description: Sends a password reset link to the user's email. No prior token required.
      operationId: forgotPassword
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordDto"
        required: true
      responses:
        "202":
          description: Accepted
          content:
            '*/*':
              schema:
                type: string
  /auth/checkResetPassword:
    get:
      tags:
      - auth-controller
      summary: Validate reset password token
      description: Validates the password reset token from the reset link. No prior token required.
      operationId: checkResetPassword
      security: []
      parameters:
      - name: confirmationToken
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int64
  /auth/resetPassword:
    post:
      tags:
      - auth-controller
      summary: Reset password
      description: Changes the user's password using a valid reset token. No prior token required.
      operationId: resetPassword
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /auth/resend-activation:
    post:
      tags:
      - auth-controller
      summary: Resend activation email
      description: Re-sends the activation email for an account that has not yet been activated. No prior token required.
      operationId: resendActivation
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendActivationDto"
        required: true
      responses:
        "202":
          description: Accepted
          content:
            '*/*':
              schema:
                type: string
  /auth/logout:
    delete:
      tags:
      - auth-controller
      summary: Logout user
      description: Invalidates the user's refresh token.
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequestDto"
        required: true
      responses:
        "204":
          description: No Content
  /employees:
    get:
      tags:
      - crud-controller
      summary: Search employees
      description: Filters employees by name, surname, email, position and department with pagination.
      operationId: searchEmployees
      parameters:
      - name: ime
        in: query
        required: false
        schema:
          type: string
      - name: prezime
        in: query
        required: false
        schema:
          type: string
      - name: email
        in: query
        required: false
        schema:
          type: string
      - name: pozicija
        in: query
        required: false
        schema:
          type: string
      - name: departman
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
          maximum: 100
          minimum: 1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageEmployeeResponseDto"
    post:
      tags:
      - crud-controller
      summary: Create employee
      description: Creates a new employee and sends an activation email. Requires ADMIN role.
      operationId: createEmployee
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreateRequestDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
  /employees/search:
    get:
      tags:
      - crud-controller
      summary: Global employee search
      description: Searches employees by a single free-text query across name, surname, email, position and department.
      operationId: globalSearchEmployees
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageEmployeeResponseDto"
  /employees/{id}:
    put:
      tags:
      - crud-controller
      summary: Update employee by id
      description: Updates employee data. Returns 202 Accepted when the account is deactivated. Requires AGENT role.
      operationId: updateEmployee
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdateRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
        "202":
          description: Accepted — account was deactivated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
    delete:
      tags:
      - crud-controller
      summary: Delete employee by id
      description: Soft-deletes an employee and sends a deactivation email. Requires ADMIN role.
      operationId: deleteEmployee
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: No Content
  /employees/edit:
    put:
      tags:
      - crud-controller
      summary: Edit own profile
      description: Allows the currently authenticated employee to update their own profile data.
      operationId: editEmployee
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeEditRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
components:
  schemas:
    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - email
      - password
    RefreshTokenRequestDto:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
      - refreshToken
    TokenResponseDto:
      type: object
      properties:
        jwt:
          type: string
        refreshToken:
          type: string
        role:
          type: string
          enum:
          - BASIC
          - AGENT
          - SUPERVISOR
          - ADMIN
        permissions:
          type: array
          items:
            type: string
            enum:
            - BANKING_BASIC
            - CLIENT_MANAGE
            - SECURITIES_TRADE_LIMITED
            - SECURITIES_TRADE_UNLIMITED
            - TRADE_UNLIMITED
            - OTC_TRADE
            - FUND_AGENT_MANAGE
            - EMPLOYEE_MANAGE_ALL
          uniqueItems: true
    ActivateDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        confirmationToken:
          type: string
          minLength: 43
          maxLength: 43
        password:
          type: string
          minLength: 8
          maxLength: 32
          pattern: "^(?=(?:.*\\d){2,})(?=.*[a-z])(?=.*[A-Z])(?=\\S+$).*$"
      required:
      - confirmationToken
      - id
      - password
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    ResendActivationDto:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    LogoutRequestDto:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
      - refreshToken
    EmployeeCreateRequestDto:
      type: object
      properties:
        ime:
          type: string
          minLength: 1
        prezime:
          type: string
          minLength: 1
        datumRodjenja:
          type: string
          format: date
        pol:
          type: string
          enum:
          - M
          - Z
        email:
          type: string
          format: email
          minLength: 1
        brojTelefona:
          type: string
          pattern: "^\\+?[0-9]{8,15}$"
        adresa:
          type: string
        username:
          type: string
          minLength: 1
        pozicija:
          type: string
          minLength: 1
        departman:
          type: string
          minLength: 1
        role:
          type: string
          enum:
          - BASIC
          - AGENT
          - SUPERVISOR
          - ADMIN
      required:
      - datumRodjenja
      - departman
      - email
      - ime
      - pol
      - pozicija
      - prezime
      - role
      - username
    EmployeeUpdateRequestDto:
      type: object
      properties:
        ime:
          type: string
          minLength: 1
        prezime:
          type: string
          minLength: 1
        brojTelefona:
          type: string
          pattern: "^\\+?[0-9]{8,15}$"
        adresa:
          type: string
        pozicija:
          type: string
          minLength: 1
        departman:
          type: string
          minLength: 1
        aktivan:
          type: boolean
        role:
          type: string
          enum:
          - BASIC
          - AGENT
          - SUPERVISOR
          - ADMIN
    EmployeeEditRequestDto:
      type: object
      properties:
        ime:
          type: string
        prezime:
          type: string
        brojTelefona:
          type: string
        adresa:
          type: string
        pozicija:
          type: string
        departman:
          type: string
    EmployeeResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ime:
          type: string
        prezime:
          type: string
        email:
          type: string
        username:
          type: string
        pozicija:
          type: string
        departman:
          type: string
        aktivan:
          type: boolean
        role:
          type: string
          enum:
          - BASIC
          - AGENT
          - SUPERVISOR
          - ADMIN
    PageEmployeeResponseDto:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeResponseDto"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
